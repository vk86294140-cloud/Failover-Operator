apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: failoverapps.ops.failover.dev
spec:
  group: ops.failover.dev
  names:
    kind: FailoverApp
    listKind: FailoverAppList
    plural: failoverapps
    singular: failoverapp
    shortNames:
      - fa
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Available
          type: integer
          jsonPath: .status.availableReplicas
        - name: Desired
          type: integer
          jsonPath: .spec.replicas
      schema:
        openAPIV3Schema:
          description: FailoverApp ensures a Deployment exists and reports whether it holds at or above a minimum-healthy replica floor.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - image
                - minHealthy
              properties:
                image:
                  description: Container image the managed Deployment runs.
                  type: string
                replicas:
                  description: Desired number of pods.
                  type: integer
                  format: int32
                  default: 2
                  minimum: 1
                minHealthy:
                  description: Available pods required before the app reports Ready.
                  type: integer
                  format: int32
                  minimum: 1
                port:
                  description: Container port the app listens on.
                  type: integer
                  format: int32
                  default: 8080
            status:
              type: object
              properties:
                availableReplicas:
                  type: integer
                  format: int32
                ready:
                  type: boolean
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
